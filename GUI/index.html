<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predicciones Pro - Duvan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="sidebar">
        <div class="profile-sidebar text-center">
            <div class="profile-img-content">
                <img src="https://i.pravatar.cc/150?u=duvan" alt="Perfil" id="sidebar-profile-img">
                <div class="status-indicator"></div>
            </div>
            <h5 class="profile-name">Duvan</h5>
            <p class="profile-role">Analista de Datos</p>
        </div>
        <hr class="separator">
        <ul class="nav-links">
            <li><a href="#" onclick="showSection('torneos')" id="link-torneos" class="active"><i class='bx bx-trophy'></i><span class="link_name">Torneos</span></a></li>
            <li><a href="#" onclick="showSection('estadisticas')" id="link-estadisticas"><i class='bx bx-line-chart'></i><span class="link_name">Estadísticas</span></a></li>
            <li><a href="#" onclick="showSection('staff')" id="link-staff"><i class='bx bx-group'></i><span class="link_name">Staff Jugadores</span></a></li>
            <li><a href="#" onclick="showSection('perfil')" id="link-perfil"><i class='bx bx-user-circle'></i><span class="link_name">Perfil</span></a></li>
        </ul>
    </div>

    <section class="home-section">
        <nav>
            <div class="sidebar-button"><i class='bx bx-menu'></i><span class="dashboard">Panel de Control</span></div>
            <div class="top-nav-info"><span id="current-date" class="text-muted small"></span></div>
        </nav>

        <div class="home-content container-fluid p-4">
            <div id="sec-torneos" class="content-section">
                <!-- VISTA 1: LISTA DINÁMICA DE TORNEOS -->
                <div id="vista-lista-torneos">
                    <h2 class="mb-4">Torneos Disponibles</h2>
                    <div class="row" id="grid-torneos">
                        <!-- Los torneos de Python se inyectan aquí automáticamente -->
                    </div>
                </div>

                <!-- VISTA 2: PARTIDOS DEL TORNEO SELECCIONADO -->
                <div id="vista-detalles-torneo" class="d-none">
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a href="#" onclick="volverAListaTorneos()">Torneos</a></li>
                            <li class="breadcrumb-item active" id="breadcrumb-torneo-actual">Cargando...</li>
                        </ol>
                    </nav>
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 id="titulo-torneo-actual">Partidos</h2>
                        <button class="btn btn-outline-primary btn-sm" onclick="cargarPredicciones()"><i class='bx bx-refresh'></i></button>
                    </div>
                    <div id="contenedor-predicciones" class="row"></div>
                </div>
            </div>

            <!-- SECCIONES ADICIONALES -->
            <div id="sec-estadisticas" class="content-section d-none"><h2>📊 Estadísticas</h2></div>
            <div id="sec-staff" class="content-section d-none"><h2>👥 Staff Jugadores</h2></div>
            <div id="sec-perfil" class="content-section d-none">
                <h2>👤 Mi Perfil</h2>
                <div class="card p-4 border-0 shadow-sm col-md-6 text-center">
                    <img src="https://i.pravatar.cc/150?u=duvan" id="main-profile-img" class="rounded-circle border border-4 border-primary mx-auto" width="120">
                    <div class="mt-3">
                        <button class="btn btn-sm btn-primary" id="btn-cambiar-foto" type="button">Cambiar Foto</button>
                        <input type="file" id="fileInput" hidden accept="image/*">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="js/script.js"></script>
</body>
</html>
